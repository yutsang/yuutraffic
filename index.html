<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#00338d" />
<meta name="description" content="Hong Kong public transport explorer — route maps and live ETA from HK gov open data." />
<title>YuuTraffic — Hong Kong Public Transport</title>

<link rel="preconnect" href="https://unpkg.com" crossorigin />
<link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
<link rel="preconnect" href="https://data.etabus.gov.hk" crossorigin />
<link rel="preconnect" href="https://rt.data.gov.hk" crossorigin />
<link rel="preconnect" href="https://data.etagmb.gov.hk" crossorigin />

<link rel="preload" href="./data/routes.json" as="fetch" crossorigin />

<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />
<link rel="stylesheet" href="./style.css?v=20260426024633-7946b1d9" />
</head>
<body>
<div id="yuu" class="yuu-widget">
  <header class="yuu-header">
    <h1 class="yuu-title">YuuTraffic</h1>
    <div class="yuu-search">
      <input type="search"
             id="yuu-search-input"
             placeholder="Search route, or leave empty for nearby"
             autocomplete="off"
             spellcheck="false"
             aria-label="Search route" />
      <select id="yuu-mode-select" class="yuu-mode-select" aria-label="Filter by mode">
        <option value="">All</option>
        <option value="bus">Bus</option>
        <option value="minibus">Minibus</option>
        <option value="mtrb">MTR Bus</option>
      </select>
      <div id="yuu-search-results" class="yuu-search-results" hidden></div>
    </div>
  </header>

  <div id="yuu-map" class="yuu-map" aria-label="Route map"></div>

  <main class="yuu-main">
    <section id="yuu-welcome" class="yuu-welcome">
      <p class="yuu-welcome-lead">Search a route number or destination. Focus the search box empty to see routes passing within 250 m of your current location.</p>
      <p class="yuu-hint">Static data refreshes weekly · Live ETA fetched directly from HK government open data</p>
      <p class="yuu-legend">
        <span class="yuu-eta-time yuu-live">⚡ Live ETA</span>
        <span class="yuu-eta-time yuu-scheduled">⏱ Scheduled</span>
        <span class="yuu-eta-time yuu-arriving">Arriving</span>
      </p>
    </section>

    <section id="yuu-route" class="yuu-route" hidden>
      <div class="yuu-route-header">
        <span id="yuu-route-badge" class="yuu-badge"></span>
        <div class="yuu-route-heading">
          <div id="yuu-route-title" class="yuu-route-title"></div>
          <div id="yuu-route-chips" class="yuu-route-chips" role="toolbar"></div>
        </div>
      </div>

      <div class="yuu-stops-pane">
        <div id="yuu-stops" class="yuu-stops" aria-label="Stop list"></div>
        <div id="yuu-eta" class="yuu-eta" hidden>
          <header class="yuu-eta-header">
            <strong id="yuu-eta-stop"></strong>
            <div class="yuu-eta-controls">
              <span class="yuu-eta-fresh" id="yuu-eta-fresh"></span>
              <button type="button"
                      id="yuu-eta-refresh"
                      class="yuu-refresh-btn"
                      title="Refresh now"
                      aria-label="Refresh ETA now">↻</button>
            </div>
          </header>
          <ol id="yuu-eta-list" class="yuu-eta-list"></ol>
        </div>
      </div>
    </section>
  </main>

  <footer class="yuu-footer">
    <span id="yuu-meta">Loading…</span>
  </footer>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="" defer></script>
<script src="./app.js?v=20260426024633-7946b1d9" defer></script>
</body>
</html>
